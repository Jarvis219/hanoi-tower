<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="Tháp Hà Nội — xếp tầng nhà phố cổ, càng cao càng vui!" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Tháp Hà Nội — Stack Tower</title>
    <style>
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0f3460;
        overflow: hidden;
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
        color: #fff;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      /* Phaser handles its own centering via autoCenter: CENTER_BOTH.
         The parent just needs a definite size — no flex/grid here or it
         fights Phaser's margin-based positioning. */
      #app {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        /* Dynamic viewport for mobile address-bar collapse */
        height: 100dvh;
        padding-top: var(--safe-top);
        padding-bottom: var(--safe-bottom);
        box-sizing: border-box;
      }
      #app > canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
