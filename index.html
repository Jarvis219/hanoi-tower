  <head>

    <meta property="og:title" content="Tháp Phố Việt — Stack Tower" />
    <meta

      content="Xếp tháp phố cổ Việt Nam — Hà Nội, Huế, Đà Nẵng, Sài Gòn. Càng cao càng vui, BXH toàn cầu."
    />
    <meta property="og:image" content="https://hanoi-tower-lilac.vercel.app/og-image.png?v=2" />
    <meta property="og:image:secure_url" content="https://hanoi-tower-lilac.vercel.app/og-image.png?v=2" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://hanoi-tower-lilac.vercel.app/" />
    <meta name="twitter:title" content="Tháp Phố Việt — Stack Tower" />
    <meta
      name="twitter:description"
      content="Xếp tháp phố cổ Việt Nam — Hà Nội, Huế, Đà Nẵng, Sài Gòn. Càng cao càng vui, BXH toàn cầu."
    />
    <meta name="twitter:image" content="https://hanoi-tower-lilac.vercel.app/og-image.png?v=2" />
    <meta name="twitter:image:alt" content="Tháp Phố Việt — Stack Tower game preview" />
    <style>
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
        color: #fff;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        /* Solid fallback so a brief paint of `<html>` before bg-sky loads
           still looks themed. Real gradient lives on #bg-sky below so it
           composes correctly with the sprite layer above it. */
        background: #07101e;
      }
      /* Sky gradient — own layer so #bg-decor can sit ABOVE it.
         (Putting it on body forces z-index:-1 children behind the body
         background → sprites invisible.) */
      #bg-sky {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse at 50% 110%,
            rgba(242, 204, 143, 0.22) 0%,
            rgba(15, 26, 46, 0) 55%
          ),
          radial-gradient(
            ellipse at 80% 20%,
            rgba(255, 140, 105, 0.28) 0%,
            rgba(15, 26, 46, 0) 50%
          ),
          radial-gradient(
            ellipse at 20% 30%,
            rgba(108, 195, 209, 0.22) 0%,
            rgba(15, 26, 46, 0) 50%
          ),
          linear-gradient(180deg, #1a1a3a 0%, #0f1a2e 45%, #07101e 100%);
      }
      /* Slow-drift mesh accents (light "stars / lanterns" floating around). */
      #bg-sky::after {
        content: '';
        position: absolute;
        inset: -10vh -10vw;
        background-image:
          radial-gradient(circle at 12% 22%, rgba(255, 230, 180, 0.08) 0, transparent 6%),
          radial-gradient(circle at 85% 18%, rgba(255, 230, 180, 0.07) 0, transparent 5%),
          radial-gradient(circle at 30% 78%, rgba(255, 180, 140, 0.06) 0, transparent 6%),
          radial-gradient(circle at 70% 88%, rgba(180, 220, 255, 0.07) 0, transparent 5%),
          radial-gradient(circle at 55% 45%, rgba(255, 215, 175, 0.07) 0, transparent 7%);
        animation: drift 60s linear infinite alternate;
        pointer-events: none;
      }
      @keyframes drift {
        0% { transform: translate(0, 0); }
        100% { transform: translate(-4vw, -3vh); }
      }
      /* Phaser handles its own centering via autoCenter: CENTER_BOTH.
         The parent just needs a definite size — no flex/grid here or it
         fights Phaser's margin-based positioning. */
      #app {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        /* Dynamic viewport for mobile address-bar collapse */
        height: 100dvh;
        padding-top: var(--safe-top);
        padding-bottom: var(--safe-bottom);
        box-sizing: border-box;
        z-index: 2; /* Game canvas always on top of decorations. */
      }
      #app > canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* ─── Desktop letterbox decorations ────────────────────────────────
         Pixel-art sprites layered ABOVE the sky gradient and BELOW the
         Phaser canvas. Hidden on narrow viewports where the canvas fills
         the screen. */
      #bg-decor {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        overflow: hidden;
      }
      #bg-decor img {
        position: absolute;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        will-change: transform;
      }
      .bg-sun {
        top: 8vh;
        right: 5vw;
        width: 90px;
        opacity: 0.55;
        animation: bg-pulse 6s ease-in-out infinite;
      }
      .bg-moon {
        top: 12vh;
        left: 6vw;
        width: 70px;
        opacity: 0.45;
        animation: bg-bob 7s ease-in-out infinite;
      }
      .bg-cloud {
        opacity: 0.4;
      }
      .bg-cloud-1 {
        top: 18vh;
        left: 0;
        width: 110px;
        animation: bg-drift-right 38s linear infinite;
        animation-delay: 0s;
      }
      .bg-cloud-2 {
        top: 35vh;
        right: 0;
        width: 90px;
        animation: bg-drift-left 46s linear infinite;
        animation-delay: -8s;
      }
      .bg-cloud-3 {
        top: 55vh;
        left: 0;
        width: 130px;
        animation: bg-drift-right 52s linear infinite;
        animation-delay: -20s;
      }
      .bg-cloud-4 {
        top: 70vh;
        right: 0;
        width: 100px;
        animation: bg-drift-left 42s linear infinite;
        animation-delay: -14s;
      }
      .bg-skyline-left {
        bottom: 0;
        left: 0;
        width: 28vw;
        max-width: 380px;
        opacity: 0.35;
        filter: brightness(0.6) hue-rotate(-10deg);
      }
      .bg-skyline-right {
        bottom: 0;
        right: 0;
        width: 28vw;
        max-width: 380px;
        opacity: 0.35;
        transform: scaleX(-1);
        filter: brightness(0.6) hue-rotate(10deg);
      }
      @keyframes bg-pulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50%      { transform: scale(1.08); opacity: 0.65; }
      }
      @keyframes bg-bob {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-6px); }
      }
      @keyframes bg-drift-right {
        0%   { transform: translateX(-150px); }
        100% { transform: translateX(calc(100vw + 150px)); }
      }
      @keyframes bg-drift-left {
        0%   { transform: translateX(150px); }
        100% { transform: translateX(calc(-100vw - 150px)); }
      }
      /* Mobile: canvas fills the screen; decorations would overlap UI. Hide. */
      @media (max-width: 900px) {
        #bg-decor { display: none; }
      }
      /* Respect reduced-motion preference — keep sprites visible but stop drift. */
      @media (prefers-reduced-motion: reduce) {
        #bg-decor img {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="bg-sky" aria-hidden="true"></div>
    <div id="bg-decor" aria-hidden="true">
      <img class="bg-sun" src="/assets/images/sky/sun.png" alt="" />
      <img class="bg-moon" src="/assets/images/sky/moon_half.png" alt="" />
      <img class="bg-cloud bg-cloud-1" src="/assets/images/sky/cloud2.png" alt="" />
      <img class="bg-cloud bg-cloud-2" src="/assets/images/sky/cloud5.png" alt="" />
      <img class="bg-cloud bg-cloud-3" src="/assets/images/sky/cloud7.png" alt="" />
      <img class="bg-cloud bg-cloud-4" src="/assets/images/sky/cloud3.png" alt="" />
      <img class="bg-skyline-left" src="/assets/images/buildings/skyline_hanoi.png" alt="" />
      <img class="bg-skyline-right" src="/assets/images/buildings/skyline_saigon.png" alt="" />
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
