<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a3a"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f0b842"/>
    </linearGradient>
  </defs>
  <!-- Rounded card background — dusk sky -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Moon/sun glow at top right -->
  <circle cx="50" cy="14" r="5" fill="url(#moon)" opacity="0.9"/>
  <!-- 4-floor tower — each color = one Vietnamese city theme.
       Top to bottom matches THEME_ORDER: Hà Nội → Huế → Đà Nẵng → Sài Gòn. -->
  <g stroke="#000" stroke-width="0.6" stroke-opacity="0.6">
    <!-- Hà Nội — warm gold roof (top) -->
    <rect x="22" y="14" width="20" height="10" rx="1.5" fill="#f2cc8f"/>
    <!-- Huế — royal lavender -->
    <rect x="18" y="24" width="28" height="11" rx="1.5" fill="#c9a8ff"/>
    <!-- Đà Nẵng — coastal teal -->
    <rect x="15" y="35" width="34" height="11" rx="1.5" fill="#7adef0"/>
    <!-- Sài Gòn — sunset coral (foundation, widest) -->
    <rect x="12" y="46" width="40" height="12" rx="2" fill="#ff9d6b"/>
  </g>
  <!-- Tiny pixel windows for life -->
  <g fill="#000" fill-opacity="0.4">
    <rect x="27" y="17" width="2" height="3"/>
    <rect x="35" y="17" width="2" height="3"/>
    <rect x="24" y="28" width="2" height="3"/>
    <rect x="31" y="28" width="2" height="3"/>
    <rect x="38" y="28" width="2" height="3"/>
    <rect x="20" y="39" width="2" height="3"/>
    <rect x="27" y="39" width="2" height="3"/>
    <rect x="34" y="39" width="2" height="3"/>
    <rect x="41" y="39" width="2" height="3"/>
  </g>
  <!-- Foundation sign accent strip -->
  <rect x="14" y="50" width="36" height="4" fill="#000" fill-opacity="0.35"/>
</svg>
